name: Docker Hub token rotation reminder

on:
  schedule:
    - cron: '0 9 1 * *'   # 09:00 UTC on the 1st of every month
  workflow_dispatch:

permissions:
  issues: write

jobs:
  remind:
    name: Open rotation reminder issue
    runs-on: ubuntu-latest

    steps:
      - name: Create reminder issue
        uses: actions/github-script@v7
        with:
          script: |
            const today = new Date().toISOString().slice(0, 10);
            const body = [
              '## Monthly Docker Hub token rotation',
              '',
              'This issue is created automatically on the 1st of each month.',
              '',
              '### Steps',
              '1. Sign in to Docker Hub → Account Settings → Personal access tokens',
              '2. Generate a new token: Read + Write scope, 90-day expiration',
              '3. Copy the token (shown once)',
              '4. Update the GitHub secret:',
              '   `export DOCKERHUB_TOKEN="..." && ./bin/gh-secrets-setup.sh`',
              '5. Revoke the old token in Docker Hub',
              '6. Close this issue',
            ].join('\n');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '[Security] Rotate Docker Hub PAT — ' + today,
              body,
              labels: ['security', 'maintenance'],
            });
