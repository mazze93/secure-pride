name: Release — Docker build & push

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]*'   # v1.0.0, v1.2.3-rc1, etc.
  workflow_dispatch:
    inputs:
      push_latest:
        description: 'Also tag :latest'
        type: boolean
        default: true

env:
  REGISTRY: docker.io
  IMAGE_NAME: secure-pride
  PUSH_LATEST: ${{ github.event_name == 'push' || inputs.push_latest }}

permissions:
  contents: read

jobs:
  build-push:
    name: Build & push multi-platform image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU (cross-platform emulation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ env.PUSH_LATEST }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image digest
        env:
          IMAGE_TAGS: ${{ steps.meta.outputs.tags }}
        run: echo "Pushed $IMAGE_TAGS"
