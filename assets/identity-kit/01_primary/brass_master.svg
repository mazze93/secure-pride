<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024" role="img" aria-label="Secure Pride — Heart-Lock Shield">
  <!--
    SECURE PRIDE — VECTOR SYSTEM v1.0
    master_vectors.svg — Full-resolution source (1024px)
    Layer order (bottom to top):
      1. base-field
      2. shield-structure
      3. heart-lock-core
      4. abrasion-system + prism-capture
  -->

  <defs>
    <!-- Brass gradient: 145° (upper-left → lower-right, weighted vertical) -->
    <linearGradient id="brass-shield" x1="0%" y1="0%" x2="70%" y2="100%" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#D6B97A"/>
      <stop offset="45%"  stop-color="#B08D57"/>
      <stop offset="100%" stop-color="#7A623A"/>
    </linearGradient>

    <!-- Brass gradient for heart-lock: slightly lighter midpoint -->
    <linearGradient id="brass-lock" x1="0%" y1="0%" x2="70%" y2="100%" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#DFC485"/>
      <stop offset="45%"  stop-color="#C09862"/>
      <stop offset="100%" stop-color="#8A6E42"/>
    </linearGradient>

    <!-- Prism gradient: cyan → violet → magenta -->
    <linearGradient id="prism-a" x1="0%" y1="0%" x2="100%" y2="30%" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#6FE7FF"/>
      <stop offset="50%"  stop-color="#8A6CFF"/>
      <stop offset="100%" stop-color="#C86BFF"/>
    </linearGradient>
    <linearGradient id="prism-b" x1="10%" y1="0%" x2="100%" y2="60%" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#6FE7FF"/>
      <stop offset="50%"  stop-color="#8A6CFF"/>
      <stop offset="100%" stop-color="#C86BFF"/>
    </linearGradient>
    <linearGradient id="prism-c" x1="0%" y1="20%" x2="90%" y2="100%" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#8A6CFF"/>
      <stop offset="100%" stop-color="#C86BFF"/>
    </linearGradient>

    <!-- Clip path: shield outline, used to contain all inner elements -->
    <clipPath id="shield-clip">
      <path d="M 512,148 C 672,148 812,208 832,372 C 852,536 724,724 512,888 C 300,724 172,536 192,372 C 212,208 352,148 512,148 Z"/>
    </clipPath>
  </defs>

  <!-- ═══════════════════════════════════════════
       LAYER 1 — BASE FIELD
  ════════════════════════════════════════════ -->
  <rect id="base-field" width="1024" height="1024" fill="#0B0F14"/>

  <!-- ═══════════════════════════════════════════
       LAYER 2 — SHIELD STRUCTURE
  ════════════════════════════════════════════ -->
  <g id="shield-structure">
    <!-- Outer shield (brass fill) -->
    <path id="shield-outer"
      d="M 512,148
         C 672,148 812,208 832,372
         C 852,536 724,724 512,888
         C 300,724 172,536 192,372
         C 212,208 352,148 512,148
         Z"
      fill="url(#brass-shield)"/>

    <!-- Inner offset path (~12% inset — decorative frame line) -->
    <path id="shield-inner-frame"
      d="M 512,210
         C 648,210 772,258 788,392
         C 804,526 696,700 512,836
         C 328,700 220,526 236,392
         C 252,258 376,210 512,210
         Z"
      fill="none"
      stroke="#C4A464"
      stroke-width="1.5"
      opacity="0.35"/>
  </g>

  <!-- ═══════════════════════════════════════════
       LAYER 3 — HEART-LOCK CORE
  ════════════════════════════════════════════ -->
  <g id="heart-lock-core" clip-path="url(#shield-clip)">
    <!-- Shackle (U-arch) — brass, stroke-based, positioned above heart body -->
    <path id="shackle"
      d="M 475,492 L 475,414 C 475,362 549,362 549,414 L 549,492"
      fill="none"
      stroke="url(#brass-lock)"
      stroke-width="34"
      stroke-linecap="round"
      stroke-linejoin="round"/>

    <!-- Heart body (padlock body is heart-shaped) -->
    <path id="heart-body"
      d="M 512,648
         C 432,614 390,562 390,520
         C 390,478 416,454 448,454
         C 474,454 498,470 512,496
         C 526,470 550,454 576,454
         C 608,454 634,478 634,520
         C 634,562 592,614 512,648
         Z"
      fill="url(#brass-lock)"/>

    <!-- Keyhole: circle (authority cue — slightly elongated) -->
    <ellipse id="keyhole-circle"
      cx="512" cy="538" rx="20" ry="22"
      fill="#0B0F14"/>

    <!-- Keyhole: vertical tab below (slight elongation per spec) -->
    <path id="keyhole-tab"
      d="M 502,557 L 512,608 L 522,557 Z"
      fill="#0B0F14"/>
  </g>

  <!-- ═══════════════════════════════════════════
       LAYER 4 — ABRASION + LIGHT SYSTEM
  ════════════════════════════════════════════ -->
  <g id="abrasion-light-system" clip-path="url(#shield-clip)">

    <!-- /abrasion-system
         Directional logic: origin at heart → outward → shield interior
         Concentrated lower-left of shield interior (biased left)
    -->
    <g id="abrasion-system">

      <!-- A. Micro Scratch Set (12 paths) -->
      <!-- Stroke: #E6C98A @ 6–10% opacity, 1–2px width -->
      <line x1="372" y1="584" x2="426" y2="614" stroke="#E6C98A" stroke-width="1.5" opacity="0.09"/>
      <line x1="354" y1="624" x2="412" y2="644" stroke="#E6C98A" stroke-width="1.2" opacity="0.07"/>
      <line x1="384" y1="658" x2="436" y2="668" stroke="#E6C98A" stroke-width="1.0" opacity="0.08"/>
      <line x1="342" y1="598" x2="368" y2="632" stroke="#E6C98A" stroke-width="1.5" opacity="0.06"/>
      <line x1="416" y1="684" x2="452" y2="702" stroke="#E6C98A" stroke-width="1.2" opacity="0.09"/>
      <line x1="366" y1="710" x2="418" y2="728" stroke="#E6C98A" stroke-width="1.0" opacity="0.07"/>
      <line x1="396" y1="738" x2="428" y2="754" stroke="#E6C98A" stroke-width="1.5" opacity="0.06"/>
      <line x1="446" y1="718" x2="488" y2="740" stroke="#E6C98A" stroke-width="1.0" opacity="0.08"/>
      <line x1="352" y1="668" x2="388" y2="686" stroke="#E6C98A" stroke-width="1.2" opacity="0.07"/>
      <line x1="406" y1="604" x2="440" y2="622" stroke="#E6C98A" stroke-width="1.0" opacity="0.09"/>
      <line x1="360" y1="748" x2="400" y2="762" stroke="#E6C98A" stroke-width="1.2" opacity="0.06"/>
      <line x1="432" y1="760" x2="462" y2="778" stroke="#E6C98A" stroke-width="1.0" opacity="0.07"/>

      <!-- B. Deep Abrasion Set (3 paths, 15–25° tilt, slightly thicker, 4–6% opacity) -->
      <line x1="336" y1="572" x2="428" y2="628" stroke="#E6C98A" stroke-width="2.5" opacity="0.05"/>
      <line x1="360" y1="644" x2="446" y2="688" stroke="#E6C98A" stroke-width="2.2" opacity="0.04"/>
      <line x1="382" y1="726" x2="458" y2="762" stroke="#E6C98A" stroke-width="2.5" opacity="0.05"/>
    </g>

    <!-- /prism-capture
         3–5 thin paths intersecting abrasion zones
         NOT a continuous arc; NOT wrapping fully across shield
         Think: light caught on specific damaged edges
    -->
    <g id="prism-capture">
      <line x1="350" y1="590" x2="400" y2="578" stroke="url(#prism-a)" stroke-width="3.0" opacity="0.11"/>
      <line x1="364" y1="643" x2="418" y2="628" stroke="url(#prism-b)" stroke-width="2.5" opacity="0.13"/>
      <line x1="388" y1="700" x2="432" y2="684" stroke="url(#prism-c)" stroke-width="3.5" opacity="0.09"/>
      <line x1="344" y1="622" x2="374" y2="610" stroke="url(#prism-a)" stroke-width="2.0" opacity="0.10"/>
    </g>

  </g>
</svg>
