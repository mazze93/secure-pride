<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256" role="img" aria-label="Secure Pride — Heart-Lock Shield (medium)">
  <!--
    SECURE PRIDE — VECTOR SYSTEM v1.0
    medium_256.svg — Tier 2 (128–256px)

    Scaling rules applied:
      - Scratch count reduced ~50% (6 micro scratches, 1 deep abrasion)
      - Deepest abrasions removed
      - Only 1–2 prism fragments kept
      - Stroke widths +20% for legibility
  -->

  <defs>
    <linearGradient id="brass-shield-m" x1="0%" y1="0%" x2="70%" y2="100%">
      <stop offset="0%"   stop-color="#D6B97A"/>
      <stop offset="45%"  stop-color="#B08D57"/>
      <stop offset="100%" stop-color="#7A623A"/>
    </linearGradient>
    <linearGradient id="brass-lock-m" x1="0%" y1="0%" x2="70%" y2="100%">
      <stop offset="0%"   stop-color="#DFC485"/>
      <stop offset="45%"  stop-color="#C09862"/>
      <stop offset="100%" stop-color="#8A6E42"/>
    </linearGradient>
    <linearGradient id="prism-m" x1="0%" y1="0%" x2="100%" y2="40%">
      <stop offset="0%"   stop-color="#6FE7FF"/>
      <stop offset="50%"  stop-color="#8A6CFF"/>
      <stop offset="100%" stop-color="#C86BFF"/>
    </linearGradient>
    <clipPath id="shield-clip-m">
      <path d="M 128,37 C 168,37 203,52 208,93 C 213,134 181,181 128,222 C 75,181 43,134 48,93 C 53,52 88,37 128,37 Z"/>
    </clipPath>
  </defs>

  <!-- Layer 1: Base Field -->
  <rect width="256" height="256" fill="#0B0F14"/>

  <!-- Layer 2: Shield -->
  <g id="shield-structure">
    <path d="M 128,37 C 168,37 203,52 208,93 C 213,134 181,181 128,222 C 75,181 43,134 48,93 C 53,52 88,37 128,37 Z"
      fill="url(#brass-shield-m)"/>
    <!-- Inner frame (12% inset) -->
    <path d="M 128,52 C 162,52 193,64 197,97 C 201,130 174,175 128,209 C 82,175 55,130 59,97 C 63,64 94,52 128,52 Z"
      fill="none" stroke="#C4A464" stroke-width="0.5" opacity="0.35"/>
  </g>

  <!-- Layer 3: Heart-Lock -->
  <g id="heart-lock-core" clip-path="url(#shield-clip-m)">
    <!-- Shackle (+20% stroke width for legibility at this scale) -->
    <path d="M 119,123 L 119,103 C 119,91 137,91 137,103 L 137,123"
      fill="none" stroke="url(#brass-lock-m)" stroke-width="9" stroke-linecap="round"/>
    <!-- Heart body -->
    <path d="M 128,162
             C 108,153 98,140 98,130
             C 98,120 104,114 112,114
             C 119,114 125,118 128,124
             C 131,118 137,114 144,114
             C 152,114 158,120 158,130
             C 158,140 148,153 128,162 Z"
      fill="url(#brass-lock-m)"/>
    <!-- Keyhole -->
    <ellipse cx="128" cy="134" rx="5" ry="5.5" fill="#0B0F14"/>
    <path d="M 125,139 L 128,152 L 131,139 Z" fill="#0B0F14"/>
  </g>

  <!-- Layer 4: Abrasion + Light (Tier 2 — reduced) -->
  <g id="abrasion-light-system" clip-path="url(#shield-clip-m)">
    <g id="abrasion-system">
      <!-- 6 micro scratches (50% of full set), strokes +20% width -->
      <line x1="93"  y1="146" x2="107" y2="154" stroke="#E6C98A" stroke-width="0.55" opacity="0.08"/>
      <line x1="89"  y1="156" x2="103" y2="161" stroke="#E6C98A" stroke-width="0.45" opacity="0.07"/>
      <line x1="96"  y1="165" x2="109" y2="167" stroke="#E6C98A" stroke-width="0.55" opacity="0.09"/>
      <line x1="85"  y1="150" x2="92"  y2="158" stroke="#E6C98A" stroke-width="0.55" opacity="0.06"/>
      <line x1="104" y1="171" x2="113" y2="176" stroke="#E6C98A" stroke-width="0.45" opacity="0.08"/>
      <line x1="91"  y1="178" x2="105" y2="182" stroke="#E6C98A" stroke-width="0.55" opacity="0.07"/>
      <!-- 1 deep abrasion (no multiple deep scratches at this tier) -->
      <line x1="84"  y1="143" x2="107" y2="157" stroke="#E6C98A" stroke-width="0.85" opacity="0.05"/>
    </g>
    <g id="prism-capture">
      <!-- 1 prism fragment only -->
      <line x1="87" y1="148" x2="100" y2="144" stroke="url(#prism-m)" stroke-width="1.1" opacity="0.12"/>
    </g>
  </g>
</svg>
