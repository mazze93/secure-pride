<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" role="img" aria-label="Secure Pride — Heart-Lock Shield (micro)">
  <!--
    SECURE PRIDE — VECTOR SYSTEM v1.0
    micro_32.svg — Tier 3 (32px)

    Scaling rules applied (non-negotiable):
      - ALL scratches removed
      - ALL prism fragments removed
      - Keyhole simplified to single circle (tab too small to render)
      - Clean brass shape only — meaning comes from form, not detail
  -->

  <defs>
    <linearGradient id="brass-xs" x1="0%" y1="0%" x2="70%" y2="100%">
      <stop offset="0%"   stop-color="#D6B97A"/>
      <stop offset="45%"  stop-color="#B08D57"/>
      <stop offset="100%" stop-color="#7A623A"/>
    </linearGradient>
    <linearGradient id="brass-lock-xs" x1="0%" y1="0%" x2="70%" y2="100%">
      <stop offset="0%"   stop-color="#DFC485"/>
      <stop offset="45%"  stop-color="#C09862"/>
      <stop offset="100%" stop-color="#8A6E42"/>
    </linearGradient>
  </defs>

  <!-- Base Field -->
  <rect width="32" height="32" fill="#0B0F14"/>

  <!-- Shield -->
  <path d="M 16,4 C 21,4 26,7 26,12 C 26,17 22,23 16,28 C 10,23 6,17 6,12 C 6,7 11,4 16,4 Z"
    fill="url(#brass-xs)"/>

  <!-- Shackle -->
  <path d="M 14,15 L 14,12 C 14,10 18,10 18,12 L 18,15"
    fill="none" stroke="url(#brass-lock-xs)" stroke-width="1.6" stroke-linecap="round"/>

  <!-- Heart body -->
  <path d="M 16,21
           C 13,19 12,17 12,16
           C 12,15 13,14 14,14
           C 15,14 16,15 16,16
           C 16,15 17,14 18,14
           C 19,14 20,15 20,16
           C 20,17 19,19 16,21 Z"
    fill="url(#brass-lock-xs)"/>

  <!-- Keyhole (simplified: circle only at 32px) -->
  <circle cx="16" cy="17" r="1" fill="#0B0F14"/>
</svg>
